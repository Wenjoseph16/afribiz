<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AfriBiz - Hors ligne</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #111827; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .logo { width: 64px; height: 64px; background: #059669; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: white; font-size: 1.5rem; font-weight: bold; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: #6b7280; margin: 0 0 1.5rem; line-height: 1.5; }
    .btn { display: inline-block; padding: 0.75rem 1.5rem; background: #059669; color: white; border: none; border-radius: 12px; font-size: 0.875rem; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn:hover { background: #047857; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">A</div>
    <h1>Pas de connexion</h1>
    <p>Vous êtes actuellement hors ligne. Vérifiez votre connexion internet et réessayez.</p>
    <button class="btn" onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
